<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230" font-family="Georgia, 'Times New Roman', serif">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .panel-title { font-size: 15px; font-weight: 600; fill: #222; }
    .node-box { fill: #f7f7f7; stroke: #333; stroke-width: 1.2; }
    .node-probe { fill: #fff8dc; stroke: #b8860b; stroke-width: 1.4; stroke-dasharray: 5 3; }
    .node-text { font-size: 14px; fill: #222; }
    .node-sub { font-size: 11px; fill: #666; }
    .arrow { stroke: #333; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .caption { font-size: 12.5px; fill: #333; font-style: italic; }
    .note { font-size: 11.5px; fill: #8b6914; font-style: italic; }
    .sub { font-size: 0.72em; baseline-shift: sub; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Left panel: Logit Lens -->
  <text x="190" y="28" text-anchor="middle" class="panel-title">Logit Lens (nostalgebraist, 2020)</text>

  <rect x="40"  y="60" width="70" height="44" class="node-box"/>
  <text x="75"  y="87" text-anchor="middle" class="node-text">h<tspan class="sub">ℓ</tspan></text>
  <text x="75"  y="99" text-anchor="middle" class="node-sub">residual</text>

  <path d="M110,82 L160,82" class="arrow"/>

  <rect x="160" y="60" width="70" height="44" class="node-box"/>
  <text x="195" y="87" text-anchor="middle" class="node-text">W<tspan class="sub">U</tspan></text>
  <text x="195" y="99" text-anchor="middle" class="node-sub">unembed</text>

  <path d="M230,82 L280,82" class="arrow"/>

  <rect x="280" y="60" width="70" height="44" class="node-box"/>
  <text x="315" y="87" text-anchor="middle" class="node-text">logits</text>

  <text x="195" y="140" text-anchor="middle" class="note">same W<tspan class="sub">U</tspan> at every depth — uncalibrated.</text>

  <!-- Divider -->
  <line x1="400" y1="20" x2="400" y2="180" stroke="#bbb" stroke-dasharray="3 3"/>

  <!-- Right panel: Tuned Lens -->
  <text x="620" y="28" text-anchor="middle" class="panel-title">Tuned Lens (Belrose et al., 2023)</text>

  <rect x="430" y="60" width="70" height="44" class="node-box"/>
  <text x="465" y="87" text-anchor="middle" class="node-text">h<tspan class="sub">ℓ</tspan></text>
  <text x="465" y="99" text-anchor="middle" class="node-sub">residual</text>

  <path d="M500,82 L545,82" class="arrow"/>

  <rect x="545" y="60" width="70" height="44" class="node-probe"/>
  <text x="580" y="87" text-anchor="middle" class="node-text">A<tspan class="sub">ℓ</tspan></text>
  <text x="580" y="99" text-anchor="middle" class="node-sub">affine probe</text>

  <path d="M615,82 L660,82" class="arrow"/>

  <rect x="660" y="60" width="60" height="44" class="node-box"/>
  <text x="690" y="87" text-anchor="middle" class="node-text">W<tspan class="sub">U</tspan></text>

  <path d="M720,82 L760,82" class="arrow"/>

  <text x="770" y="86" class="node-text">logits</text>

  <text x="595" y="140" text-anchor="middle" class="note">A<tspan class="sub">ℓ</tspan> trained per layer to match final distribution.</text>

  <!-- Caption -->
  <text x="410" y="210" text-anchor="middle" class="caption">Fig. 1 — Logit Lens applies W<tspan class="sub">U</tspan> directly to h<tspan class="sub">ℓ</tspan>; Tuned Lens inserts a learned affine probe A<tspan class="sub">ℓ</tspan> per layer.</text>
</svg>
