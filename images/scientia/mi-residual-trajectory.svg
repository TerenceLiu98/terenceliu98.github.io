<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Georgia, 'Times New Roman', serif">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <style>
    .title { font-size: 14px; font-weight: 600; fill: #333; }
    .axis { stroke: #555; stroke-width: 1.2; fill: none; }
    .tick { font-size: 11px; fill: #555; }
    .layer-dot { fill: #1a1a1a; }
    .layer-dot-end { fill: #b22222; }
    .traj { stroke: #1a1a1a; stroke-width: 1.8; fill: none; }
    .traj-arrow { stroke: #1a1a1a; stroke-width: 1.8; fill: none; marker-end: url(#arrowT); }
    .contour { fill: none; stroke: #888; stroke-width: 1; }
    .contour-deep { fill: none; stroke: #444; stroke-width: 1.2; }
    .label { font-size: 12.5px; fill: #222; }
    .sublabel { font-size: 11px; fill: #666; font-style: italic; }
    .caption { font-size: 12.5px; fill: #333; font-style: italic; }
    .basin-label { font-size: 12px; fill: #b22222; font-weight: 600; }
    .sub { font-size: 0.72em; baseline-shift: sub; }
    .sup { font-size: 0.72em; baseline-shift: super; }
  </style>
  <defs>
    <marker id="arrowT" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Panel A: trajectory through layers -->
  <text x="200" y="28" text-anchor="middle" class="title">(a) residual stream as trajectory</text>

  <!-- depth axis -->
  <line x1="60" y1="180" x2="420" y2="180" class="axis"/>
  <polygon points="420,175 432,180 420,185" fill="#555"/>
  <text x="436" y="184" class="tick">depth ℓ</text>

  <!-- trajectory path (slight wobble then settling into a well) -->
  <path d="M75,130 C115,105 155,160 195,125 S260,80 300,110 S365,160 395,165" class="traj"/>

  <!-- layer dots + labels -->
  <g>
    <circle cx="75"  cy="130" r="4" class="layer-dot"/>
    <text x="75"  y="200" text-anchor="middle" class="tick">0</text>
    <circle cx="135" cy="120" r="4" class="layer-dot"/>
    <text x="135" y="200" text-anchor="middle" class="tick">1</text>
    <circle cx="195" cy="125" r="4" class="layer-dot"/>
    <text x="195" y="200" text-anchor="middle" class="tick">ℓ</text>
    <circle cx="260" cy="95"  r="4" class="layer-dot"/>
    <text x="260" y="200" text-anchor="middle" class="tick">ℓ+1</text>
    <circle cx="330" cy="140" r="4" class="layer-dot"/>
    <text x="330" y="200" text-anchor="middle" class="tick">…</text>
    <circle cx="395" cy="165" r="5" class="layer-dot-end"/>
    <text x="395" y="200" text-anchor="middle" class="tick">L</text>
  </g>

  <!-- update annotation -->
  <text x="220" y="60" text-anchor="middle" class="label">h<tspan class="sub">ℓ+1</tspan> = h<tspan class="sub">ℓ</tspan> + f<tspan class="sub">ℓ</tspan>(h<tspan class="sub">ℓ</tspan>)</text>
  <path d="M222,66 Q228,82 232,100" stroke="#666" stroke-width="1" fill="none"/>

  <text x="240" y="230" text-anchor="middle" class="sublabel">one layer = one step of integration</text>

  <!-- Panel B: Fokker-Planck potential landscape -->
  <text x="600" y="28" text-anchor="middle" class="title">(b) effective potential U(h)</text>

  <!-- frame -->
  <rect x="470" y="55" width="260" height="195" fill="none" stroke="#888" stroke-width="1"/>

  <!-- contour ellipses around two basins -->
  <g transform="translate(540 155)">
    <ellipse cx="0" cy="0" rx="80" ry="55" class="contour"/>
    <ellipse cx="0" cy="0" rx="58" ry="40" class="contour"/>
    <ellipse cx="0" cy="0" rx="36" ry="25" class="contour"/>
    <ellipse cx="0" cy="0" rx="18" ry="12" class="contour-deep"/>
    <circle cx="0" cy="0" r="3" fill="#444"/>
    <text x="0" y="-70" text-anchor="middle" class="basin-label" fill="#444">basin A</text>
  </g>
  <g transform="translate(660 170)">
    <ellipse cx="0" cy="0" rx="60" ry="45" class="contour"/>
    <ellipse cx="0" cy="0" rx="42" ry="30" class="contour"/>
    <ellipse cx="0" cy="0" rx="24" ry="17" class="contour"/>
    <ellipse cx="0" cy="0" rx="10" ry="7" class="contour-deep"/>
    <circle cx="0" cy="0" r="3" fill="#b22222"/>
    <text x="0" y="-55" text-anchor="middle" class="basin-label">basin B (answer)</text>
  </g>

  <!-- trajectory across the landscape, flowing into basin B -->
  <path d="M490,85 C515,100 540,130 575,155 S630,175 660,170" class="traj-arrow"/>
  <circle cx="490" cy="85" r="3.5" class="layer-dot"/>
  <text x="485" y="78" text-anchor="end" class="tick">h<tspan class="sub">0</tspan></text>

  <text x="600" y="275" text-anchor="middle" class="sublabel">dh = −∇U(h) dℓ + σ dW<tspan class="sub">ℓ</tspan> ,   p<tspan class="sub">eq</tspan>(h) ∝ e<tspan class="sup">−U(h)/T</tspan></text>

  <!-- Caption -->
  <text x="380" y="315" text-anchor="middle" class="caption">Fig. 2 — (a) The residual stream as a discrete-time trajectory through layers.</text>
  <text x="380" y="335" text-anchor="middle" class="caption">(b) Under a Langevin / Fokker–Planck fit, depth behaves as integration time and</text>
  <text x="380" y="355" text-anchor="middle" class="caption">the trajectory flows downhill on an effective potential U(h) whose minima are high-confidence answers.</text>
</svg>
